<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petria Editor — онлайн редактор BPMN-схем</title>
  <script src="https://unpkg.com/bpmn-js@17/dist/bpmn-modeler.development.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/bpmn-js@17/dist/assets/diagram-js.css">
  <link rel="stylesheet" href="https://unpkg.com/bpmn-js@17/dist/assets/bpmn-js.css">
  <link rel="stylesheet" href="https://unpkg.com/bpmn-js@17/dist/assets/bpmn-font/css/bpmn-embedded.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #f8f9fa;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    .header {
      background: #1B4F72;
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .header-logo-text {
      color: white;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .header-logo-sub {
      color: #AED6F1;
      font-size: 13px;
      margin-left: 4px;
      font-weight: 400;
    }

    .header-back {
      color: #AED6F1;
      text-decoration: none;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .header-back:hover { color: white; }

    /* ── TOOLBAR ── */
    .toolbar {
      background: white;
      border-bottom: 1px solid #e0e0e0;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .toolbar-group {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .toolbar-divider {
      width: 1px;
      height: 28px;
      background: #e0e0e0;
      margin: 0 4px;
    }

    .btn {
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid #d0d0d0;
      background: white;
      color: #333;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn:hover { background: #f5f5f5; border-color: #bbb; }

    .btn-primary {
      background: #1B4F72;
      color: white;
      border-color: #1B4F72;
    }

    .btn-primary:hover { background: #154060; border-color: #154060; }

    .btn-danger { color: #c0392b; border-color: #e0b0ac; }
    .btn-danger:hover { background: #fdf0ef; }

    .toolbar-label {
      font-size: 12px;
      color: #888;
      margin-right: 4px;
    }

    /* ── CANVAS ── */
    .canvas-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #bpmn-canvas {
      width: 100%;
      height: 100%;
      background: white;
    }

    /* bpmn-js палитра и холст */
    .bjs-container {
      width: 100% !important;
      height: 100% !important;
    }

    .djs-palette {
      top: 10px !important;
      left: 10px !important;
    }

    /* ── СТАТУСБАР ── */
    .statusbar {
      background: #f5f5f5;
      border-top: 1px solid #e0e0e0;
      padding: 4px 16px;
      font-size: 11px;
      color: #888;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1B4F72;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 12px;
      padding: 28px;
      width: 420px;
      max-width: 90vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .modal h3 {
      font-size: 18px;
      color: #1B4F72;
      margin-bottom: 8px;
    }

    .modal p {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* ── DONATE BANNER ── */
    .donate-banner {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 14px 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      z-index: 100;
      max-width: 280px;
    }

    .donate-banner .heart { font-size: 20px; }

    .donate-banner-text { flex: 1; }
    .donate-banner-text strong { display: block; color: #1B4F72; margin-bottom: 2px; }
    .donate-banner-text span { color: #888; font-size: 12px; }

    .donate-btn {
      background: #1B4F72;
      color: white;
      border: none;
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    .donate-close {
      position: absolute;
      top: 8px;
      right: 10px;
      color: #ccc;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
    }

    .donate-close:hover { color: #999; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <a href="https://petria.io" class="header-logo">
      <span class="header-logo-text">Petria</span>
      <span class="header-logo-sub">Editor</span>
    </a>
    <a href="https://petria.io/catalog" class="header-back">
      ← Библиотека схем
    </a>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="toolbar-group">
      <button class="btn btn-primary" onclick="newDiagram()">
        + Новая схема
      </button>
    </div>

    <div class="toolbar-divider"></div>

    <div class="toolbar-group">
      <button class="btn" onclick="document.getElementById('upload-input').click()">
        ↑ Загрузить XML
      </button>
      <input id="upload-input" type="file" accept=".bpmn,.xml" style="display:none">
    </div>

    <div class="toolbar-divider"></div>

    <div class="toolbar-group">
      <button class="btn" onclick="downloadXML()">
        ↓ Скачать XML
      </button>
      <button class="btn" onclick="downloadSVG()">
        ↓ Скачать SVG
      </button>
    </div>

    <div class="toolbar-divider"></div>

    <div class="toolbar-group">
      <button class="btn" onclick="fitView()">
        ⊞ По размеру
      </button>
    </div>
  </div>

  <!-- CANVAS -->
  <div class="canvas-wrapper">
    <div id="bpmn-canvas"></div>
  </div>

  <!-- STATUSBAR -->
  <div class="statusbar">
    <span id="status-text">Готово к работе</span>
    <span>Petria Editor · <a href="https://petria.io" style="color:#888">petria.io</a></span>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- CONFIRM MODAL -->
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal">
      <h3>Создать новую схему?</h3>
      <p>Текущая схема будет очищена. Сохрани её через «Скачать XML» если нужно.</p>
      <div class="modal-buttons">
        <button class="btn" onclick="closeModal()">Отмена</button>
        <button class="btn btn-danger" onclick="confirmNew()">Очистить</button>
      </div>
    </div>
  </div>

  <!-- DONATE BANNER -->
  <div class="donate-banner" id="donate-banner">
    <span class="donate-close" onclick="document.getElementById('donate-banner').style.display='none'">×</span>
    <span class="heart">❤️</span>
    <div class="donate-banner-text">
      <strong>Нравится редактор?</strong>
      <span>Поддержи развитие Petria</span>
    </div>
    <button class="donate-btn" onclick="window.open('https://petria.io/support','_blank')">
      Поддержать
    </button>
  </div>

  <script>
    // ── ИНИЦИАЛИЗАЦИЯ ──────────────────────────────────────────────
    var modeler = new BpmnJS({
      container: '#bpmn-canvas',
      keyboard: { bindTo: window }
    });

    var EMPTY_XML = [
      '<?xml version="1.0" encoding="UTF-8"?>',
      '<bpmn:definitions',
      '  xmlns:bpmn="http://www.omg.org/spec/BPMN/20100524/MODEL"',
      '  xmlns:bpmndi="http://www.omg.org/spec/BPMN/20100524/DI"',
      '  xmlns:dc="http://www.omg.org/spec/DD/20100524/DC"',
      '  id="Definitions_1"',
      '  targetNamespace="http://bpmn.io/schema/bpmn">',
      '  <bpmn:process id="Process_1" isExecutable="true">',
      '    <bpmn:startEvent id="StartEvent_1" name="Начало"/>',
      '  </bpmn:process>',
      '  <bpmndi:BPMNDiagram id="BPMNDiagram_1">',
      '    <bpmndi:BPMNPlane id="BPMNPlane_1" bpmnElement="Process_1">',
      '      <bpmndi:BPMNShape id="_BPMNShape_StartEvent_2" bpmnElement="StartEvent_1">',
      '        <dc:Bounds x="152" y="82" width="36" height="36"/>',
      '        <bpmndi:BPMNLabel><dc:Bounds x="145" y="125" width="50" height="14"/></bpmndi:BPMNLabel>',
      '      </bpmndi:BPMNShape>',
      '    </bpmndi:BPMNPlane>',
      '  </bpmndi:BPMNDiagram>',
      '</bpmn:definitions>'
    ].join('\n');

    // Загрузить схему из URL-параметра ?load= или пустую
    window.addEventListener('load', function() {
      var params = new URLSearchParams(window.location.search);
      var loadUrl = params.get('load');

      if (loadUrl) {
        setStatus('Загрузка схемы...');
        fetch(loadUrl)
          .then(function(r) { return r.text(); })
          .then(function(xml) {
            return modeler.importXML(xml);
          })
          .then(function() {
            fitView();
            setStatus('Схема загружена из библиотеки');
            showToast('Схема загружена');
          })
          .catch(function() {
            modeler.importXML(EMPTY_XML);
            setStatus('Не удалось загрузить схему — открыта новая');
          });
      } else {
        modeler.importXML(EMPTY_XML).then(function() {
          fitView();
          setStatus('Новая схема');
        });
      }

      // Показать donate banner через 30 секунд
      setTimeout(function() {
        var banner = document.getElementById('donate-banner');
        if (banner) banner.style.display = 'flex';
      }, 30000);

      // Скрыть сразу (покажем позже)
      document.getElementById('donate-banner').style.display = 'none';
    });

    // ── ФУНКЦИИ ────────────────────────────────────────────────────

    function newDiagram() {
      document.getElementById('confirm-modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('confirm-modal').classList.remove('open');
    }

    function confirmNew() {
      closeModal();
      modeler.importXML(EMPTY_XML).then(function() {
        fitView();
        setStatus('Новая схема');
        showToast('Схема очищена');
      });
    }

    document.getElementById('upload-input').addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(ev) {
        modeler.importXML(ev.target.result)
          .then(function() {
            fitView();
            setStatus('Загружено: ' + file.name);
            showToast('Схема загружена');
          })
          .catch(function(err) {
            showToast('Ошибка: неверный формат файла');
          });
      };
      reader.readAsText(file);
      e.target.value = '';
    });

    async function downloadXML() {
      try {
        var result = await modeler.saveXML({ format: true });
        var blob = new Blob([result.xml], { type: 'application/xml' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'schema.bpmn';
        a.click();
        showToast('XML сохранён');
      } catch(e) {
        showToast('Ошибка при сохранении');
      }
    }

    async function downloadSVG() {
      try {
        var result = await modeler.saveSVG();
        var blob = new Blob([result.svg], { type: 'image/svg+xml' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'schema.svg';
        a.click();
        showToast('SVG сохранён');
      } catch(e) {
        showToast('Ошибка при сохранении SVG');
      }
    }

    function fitView() {
      var canvas = modeler.get('canvas');
      canvas.zoom('fit-viewport', 'auto');
    }

    function setStatus(text) {
      document.getElementById('status-text').textContent = text;
    }

    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 2500);
    }

    // Закрыть модал по клику на overlay
    document.getElementById('confirm-modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
  </script>
</body>
</html>
